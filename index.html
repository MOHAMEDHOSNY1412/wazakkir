/* ================= القرآن الكريم — نص موثّق من مصحف تنزيل (Tanzil) ================= */
let QURAN_DATA = null;      // يُحمَّل من quran.json عند أول استخدام
let quranView = 'index';    // 'index' | 'surah' | 'search'
let quranCurrentSurah = 1;
let quranSearchQuery = '';

async function ensureQuranLoaded(){
  if(QURAN_DATA) return QURAN_DATA;
  const res = await fetch('quran.json');
  QURAN_DATA = await res.json();
  return QURAN_DATA;
}

function renderQuran(){
  main.innerHTML = `
    <div class="cat-header">
      <div class="back-btn" id="quranBack">→</div>
      <h2>📖 القرآن الكريم</h2>
    </div>
    <div class="friday-hero">
      <span class="fi">📖</span>
      <h2>القرآن الكريم</h2>
      <p>المصحف الشريف كاملاً — نص موثّق ومُراجَع<br>
      <b style="color:var(--gold-300)">﴿إِنَّا نَحْنُ نَزَّلْنَا الذِّكْرَ وَإِنَّا لَهُ لَحَافِظُونَ﴾</b></p>
    </div>
    <div id="quranBody"><div class="note-box">⏳ جاري تحميل المصحف...</div></div>
  `;
  $('#quranBack').onclick = ()=>{
    if(quranView==='surah'){ quranView='index'; renderQuranBody(); }
    else { currentView='home'; render(); }
  };
  ensureQuranLoaded().then(()=> renderQuranBody()).catch(()=>{
    const b = $('#quranBody');
    if(b) b.innerHTML = '<div class="note-box">⚠️ تعذّر تحميل ملف المصحف (quran.json). تأكد من رفعه بجانب index.html على نفس الاستضافة.</div>';
  });
}

function renderQuranBody(){
  const body = $('#quranBody');
  if(!body || !QURAN_DATA) return;

  if(quranView === 'surah'){
    renderQuranSurah(body);
    return;
  }

  // ===== فهرس السور + صندوق البحث عن الآيات =====
  body.innerHTML = `
    <div class="search-wrap" style="margin-bottom:14px;">
      <input type="text" id="ayahSearchInput" placeholder="ابحث عن آية بجزء من نصها…" value="${quranSearchQuery}">
      <span class="si">🔍</span>
    </div>
    <div id="quranListWrap"></div>
  `;
  const input = $('#ayahSearchInput');
  input.oninput = (e)=>{ quranSearchQuery = e.target.value.trim(); renderQuranList(); };
  input.focus();
  renderQuranList();
}

function renderQuranList(){
  const wrap = $('#quranListWrap');
  if(!wrap) return;

  if(quranSearchQuery.length >= 2){
    // ===== وضع البحث في الآيات =====
    const q = quranSearchQuery;
    let results = [];
    for(const s of QURAN_DATA){
      s.v.forEach((text, idx)=>{
        if(text.includes(q)) results.push({ surahId:s.id, surahName:s.name, ayahNum: idx+1, text });
      });
      if(results.length > 200) return; // حماية من نتائج ضخمة جدًا
    }
    wrap.innerHTML = `<div class="section-title" style="margin-top:0;"><span class="dot"></span>نتائج البحث (${results.length})</div>`;
    if(results.length === 0){
      wrap.innerHTML += `<div class="empty"><div class="ic">🔎</div>لا توجد آيات مطابقة</div>`;
      return;
    }
    results.slice(0,200).forEach(r=>{
      const d = document.createElement('div');
      d.className = 'ayah-card';
      d.style.cursor = 'pointer';
      d.innerHTML = `
        <span class="ayah-num">${r.ayahNum}</span>
        <span class="ayah-text">${highlightMatch(r.text, q)}</span>
        <div class="ayah-footer"><span class="page-badge">سورة ${r.surahName} — آية ${r.ayahNum}</span></div>
      `;
      d.onclick = ()=>{ quranView='surah'; quranCurrentSurah=r.surahId; quranSearchQuery=''; renderQuranBody(); };
      wrap.appendChild(d);
    });
    return;
  }

  // ===== فهرس السور =====
  wrap.innerHTML = `<div class="section-title" style="margin-top:0;"><span class="dot"></span>فهرس السور (١١٤ سورة)</div><div id="surahIndexList"></div>`;
  const list = $('#surahIndexList');
  QURAN_DATA.forEach(s=>{
    const d = document.createElement('div');
    d.className = 'surah-index-item';
    d.innerHTML = `
      <div class="surah-num">${s.id}</div>
      <div class="surah-info">
        <div class="surah-name">سورة ${s.name}</div>
        <div class="surah-sub">${s.type==='meccan'?'مكية':'مدنية'} · ${s.v.length} آية</div>
      </div>
      <div class="surah-arrow">‹</div>
    `;
    d.onclick = ()=>{ quranView='surah'; quranCurrentSurah=s.id; renderQuranBody(); };
    list.appendChild(d);
  });
}

function highlightMatch(text, q){
  if(!q) return text;
  const idx = text.indexOf(q);
  if(idx === -1) return text;
  return text.slice(0,idx) + '<mark>' + text.slice(idx,idx+q.length) + '</mark>' + text.slice(idx+q.length);
}

let TAFSIR_DATA = null;
async function ensureTafsirLoaded(){
  if(TAFSIR_DATA) return TAFSIR_DATA;
  const res = await fetch('tafsir.json');
  TAFSIR_DATA = await res.json();
  return TAFSIR_DATA;
}

function renderQuranSurah(body){
  const s = QURAN_DATA.find(x=>x.id===quranCurrentSurah);
  if(!s){ quranView='index'; renderQuranBody(); return; }
  const showBismillah = s.id !== 1 && s.id !== 9; // الفاتحة تتضمنها كآية، والتوبة بلا بسملة

  body.innerHTML = `
    <div class="kahf-nav">
      <button id="prevSurahBtn" ${s.id<=1?'disabled':''}>→ السابقة</button>
      <span class="kahf-page-indicator">سورة ${s.name} (${s.id}/114)</span>
      <button id="nextSurahBtn" ${s.id>=114?'disabled':''}>التالية ←</button>
    </div>
    <div class="kahf-info">
      📖 <b>سورة ${s.name}</b> — ${s.type==='meccan'?'مكية':'مدنية'}، ${s.v.length} آية
    </div>
    ${showBismillah ? `<div class="bismillah-box">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>` : ''}
    <div id="surahAyahList"></div>
  `;
  const list = $('#surahAyahList');
  s.v.forEach((text, idx)=>{
    const d = document.createElement('div');
    d.className = 'ayah-card';
    d.innerHTML = `
      <span class="ayah-num">${idx+1}</span>
      <span class="ayah-text">${text}</span>
      <div class="ayah-footer">
        <span class="page-badge">آية ${idx+1}</span>
        <span class="tafsir-btn" data-idx="${idx}">📘 التفسير الميسر</span>
      </div>
      <div class="tafsir-box" id="tafsirBox-${idx}" style="display:none;"></div>
    `;
    const btn = d.querySelector('.tafsir-btn');
    btn.onclick = async ()=>{
      const box = d.querySelector('#tafsirBox-'+idx);
      if(box.style.display === 'block'){ box.style.display = 'none'; return; }
      if(!box.dataset.loaded){
        box.innerHTML = '⏳ جاري تحميل التفسير...';
        box.style.display = 'block';
        try{
          await ensureTafsirLoaded();
          const surahTafsir = TAFSIR_DATA.find(t=>t.id===s.id);
          box.innerHTML = `<b>📘 التفسير الميسر:</b> ${surahTafsir.t[idx]}`;
          box.dataset.loaded = '1';
        }catch(e){
          box.innerHTML = '⚠️ تعذّر تحميل التفسير — تأكد من رفع ملف tafsir.json بجانب index.html.';
        }
      } else {
        box.style.display = 'block';
      }
    };
    list.appendChild(d);
  });
  $('#prevSurahBtn').onclick = ()=>{ if(s.id>1){ quranCurrentSurah=s.id-1; renderQuranBody(); window.scrollTo(0,0); } };
  $('#nextSurahBtn').onclick = ()=>{ if(s.id<114){ quranCurrentSurah=s.id+1; renderQuranBody(); window.scrollTo(0,0); } };
}

const ARBAEEN_HADITH = [{"id":1,"text":"عَنْ أَمِيرِ الْمُؤْمِنِينَ أَبِي حَفْصٍ عُمَرَ بْنِ الْخَطَّابِ رَضِيَ اللهُ عَنْهُ قَالَ: سَمِعْتُ رَسُولَ اللَّهِ صلى الله عليه وسلم يَقُولُ: \" إنَّمَا الْأَعْمَالُ بِالنِّيَّاتِ، وَإِنَّمَا لِكُلِّ امْرِئٍ مَا نَوَى، فَمَنْ كَانَتْ هِجْرَتُهُ إلَى اللَّهِ وَرَسُولِهِ فَهِجْرَتُهُ إلَى اللَّهِ وَرَسُولِهِ، وَمَنْ كَانَتْ هِجْرَتُهُ لِدُنْيَا يُصِيبُهَا أَوْ امْرَأَةٍ يَنْكِحُهَا فَهِجْرَتُهُ إلَى مَا هَاجَرَ إلَيْهِ\". رَوَاهُ إِمَامَا الْمُحَدِّثِينَ أَبُو عَبْدِ اللهِ مُحَمَّدُ بنُ إِسْمَاعِيل بن إِبْرَاهِيم بن الْمُغِيرَة بن بَرْدِزبَه الْبُخَارِيُّ الْجُعْفِيُّ رَضِيَ اللهُ عَنْهُمَا فِي \"صَحِيحَيْهِمَا\" اللذَينِ هُمَا أَصَحُّ الْكُتُبِ الْمُصَنَّفَةِ.","explain":"الأعمال تُقاس بنياتها، فالعمل الواحد قد يكون عبادة أو عادة بحسب قصد صاحبه؛ فالإخلاص لله هو أساس قبول كل عمل."},{"id":2,"text":"عَنْ عُمَرَ رَضِيَ اللهُ عَنْهُ أَيْضًا قَالَ: \" بَيْنَمَا نَحْنُ جُلُوسٌ عِنْدَ رَسُولِ اللَّهِ صلى الله عليه و سلم ذَاتَ يَوْمٍ، إذْ طَلَعَ عَلَيْنَا رَجُلٌ شَدِيدُ بَيَاضِ الثِّيَابِ، شَدِيدُ سَوَادِ الشَّعْرِ، لَا يُرَى عَلَيْهِ أَثَرُ السَّفَرِ، وَلَا يَعْرِفُهُ مِنَّا أَحَدٌ. حَتَّى جَلَسَ إلَى النَّبِيِّ صلى الله عليه و سلم . فَأَسْنَدَ رُكْبَتَيْهِ إلَى رُكْبَتَيْهِ، وَوَضَعَ كَفَّيْهِ عَلَى فَخِذَيْهِ، وَقَالَ: يَا مُحَمَّدُ أَخْبِرْنِي عَنْ الْإِسْلَامِ. فَقَالَ رَسُولُ اللَّهِ صلى الله عليه و سلم الْإِسْلَامُ أَنْ تَشْهَدَ أَنْ لَا إلَهَ إلَّا اللَّهُ وَأَنَّ مُحَمَّدًا رَسُولُ اللَّهِ، وَتُقِيمَ الصَّلَاةَ، وَتُؤْتِيَ الزَّكَاةَ، وَتَصُومَ رَمَضَانَ، وَتَحُجَّ الْبَيْتَ إنْ اسْتَطَعْت إلَيْهِ سَبِيلًا. قَالَ: صَدَقْت . فَعَجِبْنَا لَهُ يَسْأَلُهُ وَيُصَدِّقُهُ! قَالَ: فَأَخْبِرْنِي عَنْ الْإِيمَانِ. قَالَ: أَنْ تُؤْمِنَ بِاَللَّهِ وَمَلَائِكَتِهِ وَكُتُبِهِ وَرُسُلِهِ وَالْيَوْمِ الْآخِرِ، وَتُؤْمِنَ بِالْقَدَرِ خَيْرِهِ وَشَرِّهِ. قَالَ: صَدَقْت. قَالَ: فَأَخْبِرْنِي عَنْ الْإِحْسَانِ. قَالَ: أَنْ تَعْبُدَ اللَّهَ كَأَنَّك تَرَاهُ، فَإِنْ لَمْ تَكُنْ تَرَاهُ فَإِنَّهُ يَرَاك. قَالَ: فَأَخْبِرْنِي عَنْ السَّاعَةِ. قَالَ: مَا الْمَسْئُولُ عَنْهَا بِأَعْلَمَ مِنْ السَّائِلِ. قَالَ: فَأَخْبِرْنِي عَنْ أَمَارَاتِهَا؟ قَالَ: أَنْ تَلِدَ الْأَمَةُ رَبَّتَهَا، وَأَنْ تَرَى الْحُفَاةَ الْعُرَاةَ الْعَالَةَ رِعَاءَ الشَّاءِ يَتَطَاوَلُونَ فِي الْبُنْيَانِ. ثُمَّ انْطَلَقَ، فَلَبِثْتُ مَلِيًّا، ثُمَّ قَالَ: يَا عُمَرُ أَتَدْرِي مَنْ السَّائِلُ؟. ‫‬قُلْتُ: اللَّهُ وَرَسُولُهُ أَعْلَمُ. قَالَ: فَإِنَّهُ جِبْرِيلُ أَتَاكُمْ يُعَلِّمُكُمْ دِينَكُمْ \". .","explain":"بيان أركان الإسلام والإيمان والإحسان، وأن الإحسان أعلى المراتب وهو أن يعبد المسلم ربه وكأنه يراه."},{"id":3,"text":"عَنْ أَبِي عَبْدِ الرَّحْمَنِ عَبْدِ اللَّهِ بْنِ عُمَرَ بْنِ الْخَطَّابِ رَضِيَ اللَّهُ عَنْهُمَا قَالَ: سَمِعْت رَسُولَ اللَّهِ صلى الله عليه و سلم يَقُولُ: \" بُنِيَ الْإِسْلَامُ عَلَى خَمْسٍ: شَهَادَةِ أَنْ لَا إلَهَ إلَّا اللَّهُ وَأَنَّ مُحَمَّدًا رَسُولُ اللَّهِ، وَإِقَامِ الصَّلَاةِ، وَإِيتَاءِ الزَّكَاةِ، وَحَجِّ الْبَيْتِ، وَصَوْمِ رَمَضَانَ\". .","explain":"أركان الإسلام الخمسة: الشهادتان، وإقام الصلاة، وإيتاء الزكاة، وصوم رمضان، وحج البيت لمن استطاع إليه سبيلاً."},{"id":4,"text":"عَنْ أَبِي عَبْدِ الرَّحْمَنِ عَبْدِ اللَّهِ بْنِ مَسْعُودٍ رَضِيَ اللهُ عَنْهُ قَالَ: حَدَّثَنَا رَسُولُ اللَّهِ صلى الله عليه و سلم -وَهُوَ الصَّادِقُ الْمَصْدُوقُ-: \"إنَّ أَحَدَكُمْ يُجْمَعُ خَلْقُهُ فِي بَطْنِ أُمِّهِ أَرْبَعِينَ يَوْمًا نُطْفَةً، ثُمَّ يَكُونُ عَلَقَةً مِثْلَ ذَلِكَ، ثُمَّ يَكُونُ مُضْغَةً مِثْلَ ذَلِكَ، ثُمَّ يُرْسَلُ إلَيْهِ الْمَلَكُ فَيَنْفُخُ فِيهِ الرُّوحَ، وَيُؤْمَرُ بِأَرْبَعِ كَلِمَاتٍ: بِكَتْبِ رِزْقِهِ، وَأَجَلِهِ، وَعَمَلِهِ، وَشَقِيٍّ أَمْ سَعِيدٍ؛ فَوَاَللَّهِ الَّذِي لَا إلَهَ غَيْرُهُ إنَّ أَحَدَكُمْ لَيَعْمَلُ بِعَمَلِ أَهْلِ الْجَنَّةِ حَتَّى مَا يَكُونُ بَيْنَهُ وَبَيْنَهَا إلَّا ذِرَاعٌ فَيَسْبِقُ عَلَيْهِ الْكِتَابُ فَيَعْمَلُ بِعَمَلِ أَهْلِ النَّارِ فَيَدْخُلُهَا. وَإِنَّ أَحَدَكُمْ لَيَعْمَلُ بِعَمَلِ أَهْلِ النَّارِ حَتَّى مَا يَكُونُ بَيْنَهُ وَبَيْنَهَا إلَّا ذِرَاعٌ فَيَسْبِقُ عَلَيْهِ الْكِتَابُ فَيَعْمَلُ بِعَمَلِ أَهْلِ الْجَنَّةِ فَيَدْخُلُهَا\". .","explain":"تفصيل أطوار خلق الإنسان في الرحم، وأن الأرزاق والآجال والأعمال مكتوبة مقدَّرة قبل أن يُخلق الإنسان."},{"id":5,"text":"عَنْ أُمِّ الْمُؤْمِنِينَ أُمِّ عَبْدِ اللَّهِ عَائِشَةَ رَضِيَ اللَّهُ عَنْهَا، قَالَتْ: قَالَ: رَسُولُ اللَّهِ صلى الله عليه و سلم \"مَنْ أَحْدَثَ فِي أَمْرِنَا هَذَا مَا لَيْسَ مِنْهُ فَهُوَ رَدٌّ وَفِي رِوَايَةٍ لِمُسْلِمٍ: مَنْ عَمِلَ عَمَلًا لَيْسَ عَلَيْهِ أَمْرُنَا فَهُوَ رَدٌّ\".","explain":"كل عمل أو عبادة لم يأذن بها الشرع فهي مردودة على صاحبها، مهما حَسُنت نيته، فلا اجتهاد مع نص."},{"id":6,"text":"عَنْ أَبِي عَبْدِ اللَّهِ النُّعْمَانِ بْنِ بَشِيرٍ رَضِيَ اللَّهُ عَنْهُمَا، قَالَ: سَمِعْت رَسُولَ اللَّهِ صلى الله عليه و سلم يَقُولُ: \"إنَّ الْحَلَالَ بَيِّنٌ، وَإِنَّ الْحَرَامَ بَيِّنٌ، وَبَيْنَهُمَا أُمُورٌ مُشْتَبِهَاتٌ لَا يَعْلَمُهُنَّ كَثِيرٌ مِنْ النَّاسِ، فَمَنْ اتَّقَى الشُّبُهَاتِ فَقْد اسْتَبْرَأَ لِدِينِهِ وَعِرْضِهِ، وَمَنْ وَقَعَ فِي الشُّبُهَاتِ وَقَعَ فِي الْحَرَامِ، كَالرَّاعِي يَرْعَى حَوْلَ الْحِمَى يُوشِكُ أَنْ يَرْتَعَ فِيهِ، أَلَا وَإِنَّ لِكُلِّ مَلِكٍ حِمًى، أَلَا وَإِنَّ حِمَى اللَّهِ مَحَارِمُهُ، أَلَا وَإِنَّ فِي الْجَسَدِ مُضْغَةً إذَا صَلَحَتْ صَلَحَ الْجَسَدُ كُلُّهُ، وَإذَا فَسَدَتْ فَسَدَ الْجَسَدُ كُلُّهُ، أَلَا وَهِيَ الْقَلْبُ\". .","explain":"الحلال بيّن والحرام بيّن، وبينهما أمور مشتبهة يحسن للمسلم اجتنابها حفاظًا على دينه وورعًا."},{"id":7,"text":"عَنْ أَبِي رُقَيَّةَ تَمِيمِ بْنِ أَوْسٍ الدَّارِيِّ رَضِيَ اللهُ عَنْهُ أَنَّ النَّبِيَّ صلى الله عليه وسلم قَالَ: \"الدِّينُ النَّصِيحَةُ.\" قُلْنَا: لِمَنْ؟ قَالَ: \"لِلَّهِ، وَلِكِتَابِهِ، وَلِرَسُولِهِ، وَلِأَئِمَّةِ الْمُسْلِمِينَ وَعَامَّتِهِمْ.\"","explain":"الدين كله نصيحة: لله بتوحيده وطاعته، ولكتابه بتصديقه والعمل به، ولرسوله باتباعه، ولأئمة المسلمين وعامتهم بالخير والصدق."},{"id":8,"text":"عَنْ ابْنِ عُمَرَ رَضِيَ اللَّهُ عَنْهُمَا، أَنَّ رَسُولَ اللَّهِ صلى الله عليه و سلم قَالَ: \"أُمِرْتُ أَنْ أُقَاتِلَ النَّاسَ حَتَّى يَشْهَدُوا أَنْ لَا إلَهَ إلَّا اللَّهُ وَأَنَّ مُحَمَّدًا رَسُولُ اللَّهِ، وَيُقِيمُوا الصَّلَاةَ، وَيُؤْتُوا الزَّكَاةَ؛ فَإِذَا فَعَلُوا ذَلِكَ عَصَمُوا مِنِّي دِمَاءَهُمْ وَأَمْوَالَهُمْ إلَّا بِحَقِّ الْإِسْلَامِ، وَحِسَابُهُمْ عَلَى اللَّهِ تَعَالَى\" .","explain":"حرمة دماء الناس وأموالهم محفوظة بشهادة التوحيد وإقامة الصلاة والزكاة، إلا بحق الشرع، وحسابهم على الله."},{"id":9,"text":"عَنْ أَبِي هُرَيْرَةَ عَبْدِ الرَّحْمَنِ بْنِ صَخْرٍ رَضِيَ اللهُ عَنْهُ قَالَ: سَمِعْت رَسُولَ اللَّهِ صلى الله عليه و سلم يَقُولُ: \"مَا نَهَيْتُكُمْ عَنْهُ فَاجْتَنِبُوهُ، وَمَا أَمَرْتُكُمْ بِهِ فَأْتُوا مِنْهُ مَا اسْتَطَعْتُمْ، فَإِنَّمَا أَهْلَكَ الَّذِينَ مِنْ قَبْلِكُمْ كَثْرَةُ مَسَائِلِهِمْ وَاخْتِلَافُهُمْ عَلَى أَنْبِيَائِهِمْ \".","explain":"الأخذ بما استطاع المسلم من الأوامر دون تكلف، واجتناب النواهي كلها، فالاجتناب أيسر من الامتثال الكامل."},{"id":10,"text":"عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ صلى الله عليه و سلم \"إنَّ اللَّهَ طَيِّبٌ لَا يَقْبَلُ إلَّا طَيِّبًا، وَإِنَّ اللَّهَ أَمَرَ الْمُؤْمِنِينَ بِمَا أَمَرَ بِهِ الْمُرْسَلِينَ فَقَالَ تَعَالَى: \"يَا أَيُّهَا الرُّسُلُ كُلُوا مِنْ الطَّيِّبَاتِ وَاعْمَلُوا صَالِحًا\"، وَقَالَ تَعَالَى: \"يَا أَيُّهَا الَّذِينَ آمَنُوا كُلُوا مِنْ طَيِّبَاتِ مَا رَزَقْنَاكُمْ\" ثُمَّ ذَكَرَ الرَّجُلَ يُطِيلُ السَّفَرَ أَشْعَثَ أَغْبَرَ يَمُدُّ يَدَيْهِ إلَى السَّمَاءِ: يَا رَبِّ! يَا رَبِّ! وَمَطْعَمُهُ حَرَامٌ، وَمَشْرَبُهُ حَرَامٌ، وَمَلْبَسُهُ حَرَامٌ، وَغُذِّيَ بِالْحَرَامِ، فَأَنَّى يُسْتَجَابُ لَهُ؟\".","explain":"الله طيب لا يقبل إلا طيبًا، فينبغي للمسلم طلب الرزق الحلال والحرص على أكله ليكون دعاؤه مستجابًا."},{"id":11,"text":"عَنْ أَبِي مُحَمَّدٍ الْحَسَنِ بْنِ عَلِيِّ بْنِ أَبِي طَالِبٍ سِبْطِ رَسُولِ اللَّهِ صلى الله عليه و سلم وَرَيْحَانَتِهِ رَضِيَ اللَّهُ عَنْهُمَا، قَالَ: حَفِظْت مِنْ رَسُولِ اللَّهِ صلى الله عليه و سلم \"دَعْ مَا يُرِيبُك إلَى مَا لَا يُرِيبُك\". رَوَاهُ التِّرْمِذِيُّ ، وَقَالَ التِّرْمِذِيُّ: حَدِيثٌ حَسَنٌ صَحِيحٌ.","explain":"الورع في ترك ما يريب المسلم إلى ما لا يريبه، فالطمأنينة القلبية علامة على حل الأمر أو حرمته."},{"id":12,"text":"عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ صلى الله عليه و سلم \"مِنْ حُسْنِ إسْلَامِ الْمَرْءِ تَرْكُهُ مَا لَا يَعْنِيهِ\". حَدِيثٌ حَسَنٌ، رَوَاهُ التِّرْمِذِيُّ .","explain":"من علامات حسن إسلام المرء ترك الانشغال بما لا يعنيه من الأقوال والأفعال التي لا فائدة فيها."},{"id":13,"text":"عَنْ أَبِي حَمْزَةَ أَنَسِ بْنِ مَالِكٍ رَضِيَ اللهُ عَنْهُ خَادِمِ رَسُولِ اللَّهِ صلى الله عليه و سلم عَنْ النَّبِيِّ صلى الله عليه و سلم قَالَ: \"لَا يُؤْمِنُ أَحَدُكُمْ حَتَّى يُحِبَّ لِأَخِيهِ مَا يُحِبُّ لِنَفْسِهِ\". رَوَاهُ الْبُخَارِيُّ . ،","explain":"كمال الإيمان لا يتحقق حتى يحب المسلم لأخيه من الخير ما يحب لنفسه، وهذا أساس الأخوة الإسلامية."},{"id":14,"text":"عَنْ ابْنِ مَسْعُودٍ رَضِيَ اللهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ صلى الله عليه و سلم \"لَا يَحِلُّ دَمُ امْرِئٍ مُسْلِمٍ إلَّا بِإِحْدَى ثَلَاثٍ: الثَّيِّبُ الزَّانِي، وَالنَّفْسُ بِالنَّفْسِ، وَالتَّارِكُ لِدِينِهِ الْمُفَارِقُ لِلْجَمَاعَةِ\". ،","explain":"حرمة دم المسلم إلا في ثلاث حالات محددة شرعًا: القصاص، والزاني المحصن، والمرتد عن دينه التارك للجماعة."},{"id":15,"text":"عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللهُ عَنْهُ أَنَّ رَسُولَ اللَّهِ صلى الله عليه و سلم قَالَ: \"مَنْ كَانَ يُؤْمِنُ بِاَللَّهِ وَالْيَوْمِ الْآخِرِ فَلْيَقُلْ خَيْرًا أَوْ لِيَصْمُتْ، وَمَنْ كَانَ يُؤْمِنُ بِاَللَّهِ وَالْيَوْمِ الْآخِرِ فَلْيُكْرِمْ جَارَهُ، وَمَنْ كَانَ يُؤْمِنُ بِاَللَّهِ وَالْيَوْمِ الْآخِرِ فَلْيُكْرِمْ ضَيْفَهُ\". ،","explain":"من كان يؤمن بالله واليوم الآخر فليقل خيرًا أو ليصمت، وليكرم جاره وضيفه، فحفظ اللسان من كمال الإيمان."},{"id":16,"text":"عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللهُ عَنْهُ أَنَّ رَجُلًا قَالَ لِلنَّبِيِّ صلى الله عليه و سلم أَوْصِنِي. قَالَ: لَا تَغْضَبْ، فَرَدَّدَ مِرَارًا، قَالَ: لَا تَغْضَبْ\" . .","explain":"النهي عن الغضب تكرر ثلاث مرات لعِظَم أثره، فمجاهدة النفس عند الغضب من أعظم أسباب دخول الجنة."},{"id":17,"text":"عَنْ أَبِي يَعْلَى شَدَّادِ بْنِ أَوْسٍ رَضِيَ اللهُ عَنْهُ عَنْ رَسُولِ اللَّهِ صلى الله عليه و سلم قَالَ: \"إنَّ اللَّهَ كَتَبَ الْإِحْسَانَ عَلَى كُلِّ شَيْءٍ، فَإِذَا قَتَلْتُمْ فَأَحْسِنُوا الْقِتْلَةَ، وَإِذَا ذَبَحْتُمْ فَأَحْسِنُوا الذِّبْحَةَ، وَلْيُحِدَّ أَحَدُكُمْ شَفْرَتَهُ، وَلْيُرِحْ ذَبِيحَتَهُ\". .","explain":"الإحسان مطلوب في كل شيء حتى في الذبح والقتل المشروعين، فيُحسن الذابح آلته ويريح الذبيحة."},{"id":18,"text":"عَنْ أَبِي ذَرٍّ جُنْدَبِ بْنِ جُنَادَةَ، وَأَبِي عَبْدِ الرَّحْمَنِ مُعَاذِ بْنِ جَبَلٍ رَضِيَ اللَّهُ عَنْهُمَا، عَنْ رَسُولِ اللَّهِ صلى الله عليه و سلم قَالَ: \"اتَّقِ اللَّهَ حَيْثُمَا كُنْت، وَأَتْبِعْ السَّيِّئَةَ الْحَسَنَةَ تَمْحُهَا، وَخَالِقْ النَّاسَ بِخُلُقٍ حَسَنٍ\" . رَوَاهُ التِّرْمِذِيُّ وَقَالَ: حَدِيثٌ حَسَنٌ، وَفِي بَعْضِ النُّسَخِ: حَسَنٌ صَحِيحٌ.","explain":"تقوى الله في السر والعلن، ومتابعة السيئة بالحسنة تمحوها، وحسن الخلق مع الناس من كمال الدين."},{"id":19,"text":"عَنْ عَبْدِ اللَّهِ بْنِ عَبَّاسٍ رَضِيَ اللَّهُ عَنْهُمَا قَالَ: \"كُنْت خَلْفَ رَسُولِ اللَّهِ صلى الله عليه و سلم يَوْمًا، فَقَالَ: يَا غُلَامِ! إنِّي أُعَلِّمُك كَلِمَاتٍ: احْفَظْ اللَّهَ يَحْفَظْك، احْفَظْ اللَّهَ تَجِدْهُ تُجَاهَك، إذَا سَأَلْت فَاسْأَلْ اللَّهَ، وَإِذَا اسْتَعَنْت فَاسْتَعِنْ بِاَللَّهِ، وَاعْلَمْ أَنَّ الْأُمَّةَ لَوْ اجْتَمَعَتْ عَلَى أَنْ يَنْفَعُوك بِشَيْءٍ لَمْ يَنْفَعُوك إلَّا بِشَيْءٍ قَدْ كَتَبَهُ اللَّهُ لَك، وَإِنْ اجْتَمَعُوا عَلَى أَنْ يَضُرُّوك بِشَيْءٍ لَمْ يَضُرُّوك إلَّا بِشَيْءٍ قَدْ كَتَبَهُ اللَّهُ عَلَيْك؛ رُفِعَتْ الْأَقْلَامُ، وَجَفَّتْ الصُّحُفُ\" . رَوَاهُ التِّرْمِذِيُّ وَقَالَ: حَدِيثٌ حَسَنٌ صَحِيحٌ. وَفِي رِوَايَةِ غَيْرِ التِّرْمِذِيِّ: \"احْفَظْ اللَّهَ تَجِدْهُ أمامك، تَعَرَّفْ إلَى اللَّهِ فِي الرَّخَاءِ يَعْرِفُك فِي الشِّدَّةِ، وَاعْلَمْ أَنَّ مَا أَخْطَأَك لَمْ يَكُنْ لِيُصِيبَك، وَمَا أَصَابَك لَمْ يَكُنْ لِيُخْطِئَك، وَاعْلَمْ أَنَّ النَّصْرَ مَعَ الصَّبْرِ، وَأَنْ الْفَرَجَ مَعَ الْكَرْبِ، وَأَنَّ مَعَ الْعُسْرِ يُسْرًا\".","explain":"توجيه نبوي جامع: احفظ حدود الله يحفظك، وسل الله وحده واستعن به، واعلم أن النصر مع الصبر والفرج مع الكرب."},{"id":20,"text":"عَنْ أَبِي مَسْعُودٍ عُقْبَةَ بْنِ عَمْرٍو الْأَنْصَارِيِّ الْبَدْرِيِّ رَضِيَ اللهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ صلى الله عليه و سلم \"إنَّ مِمَّا أَدْرَكَ النَّاسُ مِنْ كَلَامِ النُّبُوَّةِ الْأُولَى: إذَا لَمْ تَسْتَحِ فَاصْنَعْ مَا شِئْت\" . .","explain":"الحياء خُلُق نبوي أصيل، وهو من الإيمان يمنع صاحبه من كل قبيح ويدعوه إلى كل جميل."},{"id":21,"text":"عَنْ أَبِي عَمْرٍو وَقِيلَ: أَبِي عَمْرَةَ سُفْيَانَ بْنِ عَبْدِ اللَّهِ رَضِيَ اللهُ عَنْهُ قَالَ: \"قُلْت: يَا رَسُولَ اللَّهِ! قُلْ لِي فِي الْإِسْلَامِ قَوْلًا لَا أَسْأَلُ عَنْهُ أَحَدًا غَيْرَك؛ قَالَ: قُلْ: آمَنْت بِاَللَّهِ ثُمَّ اسْتَقِمْ\" . .","explain":"الاستقامة على أمر الله بعد الإيمان به هي الطريق الأسلم، وهي جماع الخير الذي لا يُستغنى فيه عن غيره."},{"id":22,"text":"عَنْ أَبِي عَبْدِ اللَّهِ جَابِرِ بْنِ عَبْدِ اللَّهِ الْأَنْصَارِيِّ رَضِيَ اللَّهُ عَنْهُمَا: \"أَنَّ رَجُلًا سَأَلَ رَسُولَ اللَّهِ صلى الله عليه و سلم فَقَالَ: أَرَأَيْت إذَا صَلَّيْت الْمَكْتُوبَاتِ، وَصُمْت رَمَضَانَ، وَأَحْلَلْت الْحَلَالَ، وَحَرَّمْت الْحَرَامَ، وَلَمْ أَزِدْ عَلَى ذَلِكَ شَيْئًا؛ أَأَدْخُلُ الْجَنَّةَ؟ قَالَ: نَعَمْ\". .","explain":"بيان أعمال يسيرة موصلة للجنة: الصلوات الخمس، وصوم رمضان، وحفظ الفرائض، من غير زيادة ولا نقصان."},{"id":23,"text":"عَنْ أَبِي مَالِكٍ الْحَارِثِ بْنِ عَاصِمٍ الْأَشْعَرِيِّ رَضِيَ اللهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ صلى الله عليه و سلم \"الطَّهُورُ شَطْرُ الْإِيمَانِ، وَالْحَمْدُ لِلَّهِ تَمْلَأُ الْمِيزَانَ، وَسُبْحَانَ اللَّهِ وَالْحَمْدُ لِلَّهِ تَمْلَآنِ -أَوْ: تَمْلَأُ- مَا بَيْنَ السَّمَاءِ وَالْأَرْضِ، وَالصَّلَاةُ نُورٌ، وَالصَّدَقَةُ بُرْهَانٌ، وَالصَّبْرُ ضِيَاءٌ، وَالْقُرْآنُ حُجَّةٌ لَك أَوْ عَلَيْك، كُلُّ النَّاسِ يَغْدُو، فَبَائِعٌ نَفْسَهُ فَمُعْتِقُهَا أَوْ مُوبِقُهَا\". .","explain":"الطهور شطر الإيمان، والحمد والتسبيح والصلاة والصبر والقرآن كلها حجج للعبد أو عليه بحسب عمله."},{"id":24,"text":"عَنْ أَبِي ذَرٍّ الْغِفَارِيِّ رَضِيَ اللهُ عَنْهُ عَنْ النَّبِيِّ صلى الله عليه و سلم فِيمَا يَرْوِيهِ عَنْ رَبِّهِ تَبَارَكَ وَتَعَالَى، أَنَّهُ قَالَ: \"يَا عِبَادِي: إنِّي حَرَّمْت الظُّلْمَ عَلَى نَفْسِي، وَجَعَلْته بَيْنَكُمْ مُحَرَّمًا؛ فَلَا تَظَالَمُوا. يَا عِبَادِي! كُلُّكُمْ ضَالٌّ إلَّا مَنْ هَدَيْته، فَاسْتَهْدُونِي أَهْدِكُمْ. يَا عِبَادِي! كُلُّكُمْ جَائِعٌ إلَّا مَنْ أَطْعَمْته، فَاسْتَطْعِمُونِي أُطْعِمْكُمْ. يَا عِبَادِي! كُلُّكُمْ عَارٍ إلَّا مَنْ كَسَوْته، فَاسْتَكْسُونِي أَكْسُكُمْ. يَا عِبَادِي! إنَّكُمْ تُخْطِئُونَ بِاللَّيْلِ وَالنَّهَارِ، وَأَنَا أَغْفِرُ الذُّنُوبَ جَمِيعًا؛ فَاسْتَغْفِرُونِي أَغْفِرْ لَكُمْ. يَا عِبَادِي! إنَّكُمْ لَنْ تَبْلُغُوا ضُرِّي فَتَضُرُّونِي، وَلَنْ تَبْلُغُوا نَفْعِي فَتَنْفَعُونِي. يَا عِبَادِي! لَوْ أَنَّ أَوَّلَكُمْ وَآخِرَكُمْ وَإِنْسَكُمْ وَجِنَّكُمْ كَانُوا عَلَى أَتْقَى قَلْبِ رَجُلٍ وَاحِدٍ مِنْكُمْ، مَا زَادَ ذَلِكَ فِي مُلْكِي شَيْئًا. يَا عِبَادِي! لَوْ أَنَّ أَوَّلَكُمْ وَآخِرَكُمْ وَإِنْسَكُمْ وَجِنَّكُمْ كَانُوا عَلَى أَفْجَرِ قَلْبِ رَجُلٍ وَاحِدٍ مِنْكُمْ، مَا نَقَصَ ذَلِكَ مِنْ مُلْكِي شَيْئًا. يَا عِبَادِي! لَوْ أَنَّ أَوَّلَكُمْ وَآخِرَكُمْ وَإِنْسَكُمْ وَجِنَّكُمْ قَامُوا فِي صَعِيدٍ وَاحِدٍ، فَسَأَلُونِي، فَأَعْطَيْت كُلَّ وَاحِدٍ مَسْأَلَته، مَا نَقَصَ ذَلِكَ مِمَّا عِنْدِي إلَّا كَمَا يَنْقُصُ الْمِخْيَطُ إذَا أُدْخِلَ الْبَحْرَ. يَا عِبَادِي! إنَّمَا هِيَ أَعْمَالُكُمْ أُحْصِيهَا لَكُمْ، ثُمَّ أُوَفِّيكُمْ إيَّاهَا؛ فَمَنْ وَجَدَ خَيْرًا فَلْيَحْمَدْ اللَّهَ، وَمَنْ وَجَدَ غَيْرَ ذَلِكَ فَلَا يَلُومَن إلَّا نَفْسَهُ\". .","explain":"الله حرّم الظلم على نفسه وجعله بين عباده محرمًا، فليتقِ المسلم الظلم في كل تعامل مع الخلق."},{"id":25,"text":"عَنْ أَبِي ذَرٍّ رَضِيَ اللهُ عَنْهُ أَيْضًا، \"أَنَّ نَاسًا مِنْ أَصْحَابِ رَسُولِ اللَّهِ صلى الله عليه و سلم قَالُوا لِلنَّبِيِّ صلى الله عليه و سلم يَا رَسُولَ اللَّهِ ذَهَبَ أَهْلُ الدُّثُورِ بِالْأُجُورِ؛ يُصَلُّونَ كَمَا نُصَلِّي، وَيَصُومُونَ كَمَا نَصُومُ، وَيَتَصَدَّقُونَ بِفُضُولِ أَمْوَالِهِمْ. قَالَ: أَوَلَيْسَ قَدْ جَعَلَ اللَّهُ لَكُمْ مَا تَصَّدَّقُونَ؟ إنَّ بِكُلِّ تَسْبِيحَةٍ صَدَقَةً، وَكُلِّ تَكْبِيرَةٍ صَدَقَةً، وَكُلِّ تَحْمِيدَةٍ صَدَقَةً، وَكُلِّ تَهْلِيلَةٍ صَدَقَةً، وَأَمْرٌ بِمَعْرُوفٍ صَدَقَةٌ، وَنَهْيٌ عَنْ مُنْكَرٍ صَدَقَةٌ، وَفِي بُضْعِ أَحَدِكُمْ صَدَقَةٌ. قَالُوا: يَا رَسُولَ اللَّهِ أَيَأْتِي أَحَدُنَا شَهْوَتَهُ وَيَكُونُ لَهُ فِيهَا أَجْرٌ؟ قَالَ: أَرَأَيْتُمْ لَوْ وَضَعَهَا فِي حَرَامٍ أَكَانَ عَلَيْهِ وِزْرٌ؟ فَكَذَلِكَ إذَا وَضَعَهَا فِي الْحَلَالِ، كَانَ لَهُ أَجْرٌ\". .","explain":"الصدقة لا تقتصر على المال، فكل تسبيح وتكبير وأمر بمعروف ونهي عن منكر بل وحتى الجماع الحلال صدقة."},{"id":26,"text":"عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ صلى الله عليه و سلم \"كُلُّ سُلَامَى مِنْ النَّاسِ عَلَيْهِ صَدَقَةٌ، كُلَّ يَوْمٍ تَطْلُعُ فِيهِ الشَّمْسُ تَعْدِلُ بَيْنَ اثْنَيْنِ صَدَقَةٌ، وَتُعِينُ الرَّجُلَ فِي دَابَّتِهِ فَتَحْمِلُهُ عَلَيْهَا أَوْ تَرْفَعُ لَهُ عَلَيْهَا مَتَاعَهُ صَدَقَةٌ، وَالْكَلِمَةُ الطَّيِّبَةُ صَدَقَةٌ، وَبِكُلِّ خُطْوَةٍ تَمْشِيهَا إلَى الصَّلَاةِ صَدَقَةٌ، وَتُمِيطُ الْأَذَى عَنْ الطَّرِيقِ صَدَقَةٌ\". ، .","explain":"على كل عضو من أعضاء الإنسان صدقة كل يوم، وأيسرها العدل بين الناس وإماطة الأذى عن الطريق."},{"id":27,"text":"عَنْ النَّوَّاسِ بْنِ سَمْعَانَ رَضِيَ اللهُ عَنْهُ عَنْ النَّبِيِّ صلى الله عليه و سلم قَالَ: \"الْبِرُّ حُسْنُ الْخُلُقِ، وَالْإِثْمُ مَا حَاكَ فِي صَدْرِك، وَكَرِهْت أَنْ يَطَّلِعَ عَلَيْهِ النَّاسُ\" رَوَاهُ مُسْلِمٌ . وَعَنْ وَابِصَةَ بْنِ مَعْبَدٍ رَضِيَ اللهُ عَنْهُ قَالَ: أَتَيْت رَسُولَ اللَّهِ صلى الله عليه و سلم فَقَالَ: \"جِئْتَ تَسْأَلُ عَنْ الْبِرِّ؟ قُلْت: نَعَمْ. فقَالَ: استفت قلبك، الْبِرُّ مَا اطْمَأَنَّتْ إلَيْهِ النَّفْسُ، وَاطْمَأَنَّ إلَيْهِ الْقَلْبُ، وَالْإِثْمُ مَا حَاكَ فِي النَّفْسِ وَتَرَدَّدَ فِي الصَّدْرِ، وَإِنْ أَفْتَاك النَّاسُ وَأَفْتَوْك\" . حَدِيثٌ حَسَنٌ، رَوَيْنَاهُ في مُسْنَدَي الْإِمَامَيْنِ أَحْمَدَ بْنِ حَنْبَلٍ بِإِسْنَادٍ حَسَنٍ.","explain":"البر حسن الخلق، والإثم ما حاك في النفس وكرهت أن يطّلع عليه الناس، فالقلب يشهد بحقيقة الأمر."},{"id":28,"text":"عَنْ أَبِي نَجِيحٍ الْعِرْبَاضِ بْنِ سَارِيَةَ رَضِيَ اللهُ عَنْهُ قَالَ: \"وَعَظَنَا رَسُولُ اللَّهِ صلى الله عليه و سلم مَوْعِظَةً وَجِلَتْ مِنْهَا الْقُلُوبُ، وَذَرَفَتْ مِنْهَا الْعُيُونُ، فَقُلْنَا: يَا رَسُولَ اللَّهِ! كَأَنَّهَا مَوْعِظَةُ مُوَدِّعٍ فَأَوْصِنَا، قَالَ: أُوصِيكُمْ بِتَقْوَى اللَّهِ، وَالسَّمْعِ وَالطَّاعَةِ وَإِنْ تَأَمَّرَ عَلَيْكُمْ عَبْدٌ، فَإِنَّهُ مَنْ يَعِشْ مِنْكُمْ فَسَيَرَى اخْتِلَافًا كَثِيرًا، فَعَلَيْكُمْ بِسُنَّتِي وَسُنَّةِ الْخُلَفَاءِ الرَّاشِدِينَ الْمَهْدِيينَ، عَضُّوا عَلَيْهَا بِالنَّوَاجِذِ، وَإِيَّاكُمْ وَمُحْدَثَاتِ الْأُمُورِ؛ فَإِنَّ كُلَّ بِدْعَةٍ ضَلَالَةٌ\". وَقَالَ: حَدِيثٌ حَسَنٌ صَحِيحٌ.","explain":"الوصية بتقوى الله والسمع والطاعة، ولزوم السنة وسنة الخلفاء الراشدين، والحذر من البدع المحدثة."},{"id":29,"text":"عَنْ مُعَاذِ بْنِ جَبَلٍ رَضِيَ اللهُ عَنْهُ قَالَ: قُلْت يَا رَسُولَ اللَّهِ! أَخْبِرْنِي بِعَمَلٍ يُدْخِلُنِي الْجَنَّةَ وَيُبَاعِدْنِي مِنْ النَّارِ، قَالَ: \"لَقَدْ سَأَلْت عَنْ عَظِيمٍ، وَإِنَّهُ لَيَسِيرٌ عَلَى مَنْ يَسَّرَهُ اللَّهُ عَلَيْهِ: تَعْبُدُ اللَّهَ لَا تُشْرِكْ بِهِ شَيْئًا، وَتُقِيمُ الصَّلَاةَ، وَتُؤْتِي الزَّكَاةَ، وَتَصُومُ رَمَضَانَ، وَتَحُجُّ الْبَيْتَ، ثُمَّ قَالَ: أَلَا أَدُلُّك عَلَى أَبْوَابِ الْخَيْرِ؟ الصَّوْمُ جُنَّةٌ، وَالصَّدَقَةُ تُطْفِئُ الْخَطِيئَةَ كَمَا يُطْفِئُ الْمَاءُ النَّارَ، وَصَلَاةُ الرَّجُلِ فِي جَوْفِ اللَّيْلِ، ثُمَّ تَلَا: \" تَتَجَافَى جُنُوبُهُمْ عَنِ الْمَضَاجِعِ \" حَتَّى بَلَغَ \"يَعْمَلُونَ\"، ثُمَّ قَالَ: أَلَا أُخْبِرُك بِرَأْسِ الْأَمْرِ وَعَمُودِهِ وَذُرْوَةِ سَنَامِهِ؟ قُلْت: بَلَى يَا رَسُولَ اللَّهِ. قَالَ: رَأْسُ الْأَمْرِ الْإِسْلَامُ، وَعَمُودُهُ الصَّلَاةُ، وَذُرْوَةُ سَنَامِهِ الْجِهَادُ، ثُمَّ قَالَ: أَلَا أُخْبِرُك بِمَلَاكِ ذَلِكَ كُلِّهِ؟ فقُلْت: بَلَى يَا رَسُولَ اللَّهِ ! فَأَخَذَ بِلِسَانِهِ وَقَالَ: كُفَّ عَلَيْك هَذَا. قُلْت: يَا نَبِيَّ اللَّهِ وَإِنَّا لَمُؤَاخَذُونَ بِمَا نَتَكَلَّمُ بِهِ؟ فَقَالَ: ثَكِلَتْك أُمُّك وَهَلْ يَكُبُّ النَّاسَ عَلَى وُجُوهِهِمْ -أَوْ قَالَ عَلَى مَنَاخِرِهِمْ- إلَّا حَصَائِدُ أَلْسِنَتِهِمْ؟!\" . رَوَاهُ التِّرْمِذِيُّ وَقَالَ: حَدِيثٌ حَسَنٌ صَحِيحٌ.","explain":"طريق الجنة يسير: عبادة الله وحده، وإقامة الصلاة، وإيتاء الزكاة، وصيام رمضان، وحج البيت، مع ملاك ذلك كله حفظ اللسان."},{"id":30,"text":"عَنْ أَبِي ثَعْلَبَةَ الْخُشَنِيِّ جُرْثُومِ بن نَاشِر رَضِيَ اللهُ عَنْهُ عَنْ رَسُولِ اللَّهِ صلى الله عليه و سلم قَال: \"إنَّ اللَّهَ تَعَالَى فَرَضَ فَرَائِضَ فَلَا تُضَيِّعُوهَا، وَحَدَّ حُدُودًا فَلَا تَعْتَدُوهَا، وَحَرَّمَ أَشْيَاءَ فَلَا تَنْتَهِكُوهَا، وَسَكَتَ عَنْ أَشْيَاءَ رَحْمَةً لَكُمْ غَيْرَ نِسْيَانٍ فَلَا تَبْحَثُوا عَنْهَا\". حَدِيثٌ حَسَنٌ، رَوَاهُ الدَّارَقُطْنِيّ ْ\"في سننه\" ، وَغَيْرُهُ.","explain":"حدود الله لا تُنتهك، وفرائضه لا تُضيَّع، ومحرماته لا تُقرب، وما سكت عنه الشرع رحمة فلا يُسأل عنه تكلفًا."},{"id":31,"text":"عَنْ أَبِي الْعَبَّاسِ سَهْلِ بْنِ سَعْدٍ السَّاعِدِيّ رَضِيَ اللهُ عَنْهُ قَالَ: جَاءَ رَجُلٌ إلَى النَّبِيِّ صلى الله عليه و سلم فَقَالَ: يَا رَسُولَ اللهِ! دُلَّنِي عَلَى عَمَلٍ إذَا عَمِلْتُهُ أَحَبَّنِي اللهُ وَأَحَبَّنِي النَّاسُ؛ فَقَالَ: \"ازْهَدْ فِي الدُّنْيَا يُحِبَّك اللهُ، وَازْهَدْ فِيمَا عِنْدَ النَّاسِ يُحِبَّك النَّاسُ\" . حديث حسن، رَوَاهُ ابْنُ مَاجَهْ ، وَغَيْرُهُ بِأَسَانِيدَ حَسَنَةٍ.","explain":"الزهد في الدنيا يورث محبة الله، والزهد فيما عند الناس يورث محبة الناس للمرء، وهذا طريق سعادة القلب."},{"id":32,"text":"عَنْ أَبِي سَعِيدٍ سَعْدِ بْنِ مَالِكِ بْنِ سِنَانٍ الْخُدْرِيّ رَضِيَ اللهُ عَنْهُ أَنَّ رَسُولَ اللَّهِ صلى الله عليه و سلم قَالَ: \" لَا ضَرَرَ وَلَا ضِرَارَ\" . حَدِيثٌ حَسَنٌ، رَوَاهُ ابْنُ مَاجَهْ فِي \"الْمُوَطَّإِ\" عَنْ عَمْرِو بْنِ يَحْيَى عَنْ أَبِيهِ عَنْ النَّبِيِّ صلى الله عليه و سلم مُرْسَلًا، فَأَسْقَطَ أَبَا سَعِيدٍ، وَلَهُ طُرُقٌ يُقَوِّي بَعْضُهَا بَعْضًا.","explain":"لا ضرر ولا ضرار في الإسلام، فمن أضرّ بغيره ابتداءً أو بالمقابلة تجاوز حدود الشرع في التعامل."},{"id":33,"text":"عَنْ ابْنِ عَبَّاسٍ رَضِيَ اللَّهُ عَنْهُمَا أَنَّ رَسُولَ اللَّهِ صلى الله عليه و سلم قَالَ: \"لَوْ يُعْطَى النَّاسُ بِدَعْوَاهُمْ لَادَّعَى رِجَالٌ أَمْوَالَ قَوْمٍ وَدِمَاءَهُمْ، لَكِنَّ الْبَيِّنَةَ عَلَى الْمُدَّعِي، وَالْيَمِينَ عَلَى مَنْ أَنْكَرَ\" . حَدِيثٌ حَسَنٌ، رَوَاهُ الْبَيْهَقِيّ ، وَغَيْرُهُ هَكَذَا، وَبَعْضُهُ فِي \"الصَّحِيحَيْنِ\".","explain":"البينة على من ادّعى، واليمين على من أنكر، وهذا أصل عظيم من أصول القضاء وفصل الخصومات بين الناس."},{"id":34,"text":"عَنْ أَبِي سَعِيدٍ الْخُدْرِيّ رَضِيَ اللهُ عَنْهُ قَالَ سَمِعْت رَسُولَ اللَّهِ صلى الله عليه و سلم يَقُولُ: \"مَنْ رَأَى مِنْكُمْ مُنْكَرًا فَلْيُغَيِّرْهُ بِيَدِهِ، فَإِنْ لَمْ يَسْتَطِعْ فَبِلِسَانِهِ، فَإِنْ لَمْ يَسْتَطِعْ فَبِقَلْبِهِ، وَذَلِكَ أَضْعَفُ الْإِيمَانِ\" . .","explain":"تغيير المنكر باليد لمن استطاع، فإن لم يستطع فباللسان، فإن لم يستطع فبالقلب، وهذا أضعف الإيمان."},{"id":35,"text":"عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ صلى الله عليه و سلم \" لَا تَحَاسَدُوا، وَلَا تَنَاجَشُوا، وَلَا تَبَاغَضُوا، وَلَا تَدَابَرُوا، وَلَا يَبِعْ بَعْضُكُمْ عَلَى بَيْعِ بَعْضٍ، وَكُونُوا عِبَادَ اللَّهِ إخْوَانًا، الْمُسْلِمُ أَخُو الْمُسْلِمِ، لَا يَظْلِمُهُ، وَلَا يَخْذُلُهُ، وَلَا يَكْذِبُهُ، وَلَا يَحْقِرُهُ، التَّقْوَى هَاهُنَا، وَيُشِيرُ إلَى صَدْرِهِ ثَلَاثَ مَرَّاتٍ، بِحَسْبِ امْرِئٍ مِنْ الشَّرِّ أَنْ يَحْقِرَ أَخَاهُ الْمُسْلِمَ، كُلُّ الْمُسْلِمِ عَلَى الْمُسْلِمِ حَرَامٌ: دَمُهُ وَمَالُهُ وَعِرْضُهُ\" . .","explain":"النهي عن الحسد والتناجش والتباغض والتدابر والبيع على بيع الأخ، والأمر بالتآخي كعباد الله المتحابين."},{"id":36,"text":"عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللهُ عَنْهُ عَنْ النَّبِيِّ صلى الله عليه و سلم قَالَ: \"مَنْ نَفَّسَ عَنْ مُؤْمِنٍ كُرْبَةً مِنْ كُرَبِ الدُّنْيَا نَفَّسَ اللَّهُ عَنْهُ كُرْبَةً مِنْ كُرَبِ يَوْمِ الْقِيَامَةِ، وَمَنْ يَسَّرَ عَلَى مُعْسِرٍ، يَسَّرَ اللَّهُ عَلَيْهِ فِي الدُّنْيَا وَالْآخِرَةِ، وَمَنْ سَتَرَ مُسْلِما سَتَرَهُ اللهُ فِي الدُّنْيَا وَالْآخِرَةِ ، وَاَللَّهُ فِي عَوْنِ الْعَبْدِ مَا كَانَ الْعَبْدُ فِي عَوْنِ أَخِيهِ، وَمَنْ سَلَكَ طَرِيقًا يَلْتَمِسُ فِيهِ عِلْمًا سَهَّلَ اللَّهُ لَهُ بِهِ طَرِيقًا إلَى الْجَنَّةِ، وَمَا اجْتَمَعَ قَوْمٌ فِي بَيْتٍ مِنْ بُيُوتِ اللَّهِ يَتْلُونَ كِتَابَ اللَّهِ، وَيَتَدَارَسُونَهُ فِيمَا بَيْنَهُمْ؛ إلَّا نَزَلَتْ عَلَيْهِمْ السَّكِينَةُ، وَغَشِيَتْهُمْ الرَّحْمَةُ، وَ حَفَّتهُمُ المَلاَئِكَة، وَذَكَرَهُمْ اللَّهُ فِيمَنْ عِنْدَهُ، وَمَنْ أَبَطْأَ بِهِ عَمَلُهُ لَمْ يُسْرِعْ بِهِ نَسَبُهُ\". بهذا اللفظ.","explain":"من فرّج عن مسلم كربة فرّج الله عنه كربة يوم القيامة، وفضل الستر والإعانة وطلب العلم وذكر الله في المجالس."},{"id":37,"text":"عَنْ ابْنِ عَبَّاسٍ رَضِيَ اللَّهُ عَنْهُمَا عَنْ رَسُولِ اللَّهِ صلى الله عليه و سلم فِيمَا يَرْوِيهِ عَنْ رَبِّهِ تَبَارَكَ وَتَعَالَى، قَالَ: \"إنَّ اللَّهَ كَتَبَ الْحَسَنَاتِ وَالسَّيِّئَاتِ، ثُمَّ بَيَّنَ ذَلِكَ، فَمَنْ هَمَّ بِحَسَنَةٍ فَلَمْ يَعْمَلْهَا كَتَبَهَا اللَّهُ عِنْدَهُ حَسَنَةً كَامِلَةً، وَإِنْ هَمَّ بِهَا فَعَمِلَهَا كَتَبَهَا اللَّهُ عِنْدَهُ عَشْرَ حَسَنَاتٍ إلَى سَبْعِمِائَةِ ضِعْفٍ إلَى أَضْعَافٍ كَثِيرَةٍ، وَإِنْ هَمَّ بِسَيِّئَةٍ فَلَمْ يَعْمَلْهَا كَتَبَهَا اللَّهُ عِنْدَهُ حَسَنَةً كَامِلَةً، وَإِنْ هَمَّ بِهَا فَعَمِلَهَا كَتَبَهَا اللَّهُ سَيِّئَةً وَاحِدَةً\". ، ، في \"صحيحيهما\" بهذه الحروف.","explain":"فضل الله وسعته في مضاعفة الحسنات عشرًا إلى أضعاف كثيرة، وعدم مضاعفة السيئة إلا بمثلها، أو العفو عنها."},{"id":38,"text":"عَنْ أَبِي هُرَيْرَة رَضِيَ اللهُ عَنْهُ قَالَ: قَالَ رَسُول اللَّهِ صلى الله عليه و سلم إنَّ اللَّهَ تَعَالَى قَالَ: \"مَنْ عَادَى لِي وَلِيًّا فَقْد آذَنْتهُ بِالْحَرْبِ، وَمَا تَقَرَّبَ إلَيَّ عَبْدِي بِشَيْءٍ أَحَبَّ إلَيَّ مِمَّا افْتَرَضْتُهُ عَلَيْهِ، وَلَا يَزَالُ عَبْدِي يَتَقَرَّبُ إلَيَّ بِالنَّوَافِلِ حَتَّى أُحِبَّهُ، فَإِذَا أَحْبَبْتُهُ كُنْت سَمْعَهُ الَّذِي يَسْمَعُ بِهِ، وَبَصَرَهُ الَّذِي يُبْصِرُ بِهِ، وَيَدَهُ الَّتِي يَبْطِشُ بِهَا، وَرِجْلَهُ الَّتِي يَمْشِي بِهَا، وَلَئِنْ سَأَلَنِي لَأُعْطِيَنَّهُ، وَلَئِنْ اسْتَعَاذَنِي لَأُعِيذَنَّهُ\". .","explain":"من عادى لله وليًا فقد بارز الله بالمحاربة، وبيان قرب الله من عبده كلما تقرب إليه بالطاعات والنوافل بعد الفرائض."},{"id":39,"text":"عَنْ ابْنِ عَبَّاسٍ رَضِيَ اللَّهُ عَنْهُمَا أَنَّ رَسُولَ اللَّهِ صلى الله عليه و سلم قَالَ: \"إنَّ اللَّهَ تَجَاوَزَ لِي عَنْ أُمَّتِي الْخَطَأَ وَالنِّسْيَانَ وَمَا اسْتُكْرِهُوا عَلَيْهِ\" . حَدِيثٌ حَسَنٌ، رَوَاهُ ابْنُ مَاجَهْ .","explain":"رفع الحرج عن الأمة فيما وقع خطأً أو نسيانًا أو إكراهًا، فلا مؤاخذة على غير المتعمد إذا كان معذورًا شرعًا."},{"id":40,"text":"عَنْ ابْن عُمَرَ رَضِيَ اللَّهُ عَنْهُمَا قَالَ: أَخَذَ رَسُولُ اللَّهِ صلى الله عليه و سلم بِمَنْكِبِي، وَقَالَ: \"كُنْ فِي الدُّنْيَا كَأَنَّك غَرِيبٌ أَوْ عَابِرُ سَبِيلٍ\". وَكَانَ ابْنُ عُمَرَ رَضِيَ اللَّهُ عَنْهُمَا يَقُولُ: إذَا أَمْسَيْتَ فَلَا تَنْتَظِرْ الصَّبَاحَ، وَإِذَا أَصْبَحْتَ فَلَا تَنْتَظِرْ الْمَسَاءَ، وَخُذْ مِنْ صِحَّتِك لِمَرَضِك، وَمِنْ حَيَاتِك لِمَوْتِك. .","explain":"الزهد في طول الأمل والتعلق بالدنيا، واستحضار الغربة وقصر الأجل، مما يدفع للاستعداد للآخرة والعمل الصالح."},{"id":41,"text":"عَنْ أَبِي مُحَمَّدٍ عَبْدِ اللَّهِ بْنِ عَمْرِو بْنِ الْعَاصِ رَضِيَ اللَّهُ عَنْهُمَا، قَالَ: قَالَ رَسُولُ اللَّهِ صلى الله عليه و سلم \"لَا يُؤْمِنُ أَحَدُكُمْ حَتَّى يَكُونَ هَوَاهُ تَبَعًا لِمَا جِئْتُ بِهِ\". حَدِيثٌ حَسَنٌ صَحِيحٌ، رَوَيْنَاهُ فِي كِتَابِ \"الْحُجَّةِ\" بِإِسْنَادٍ صَحِيحٍ.","explain":"لا يكمل إيمان المرء حتى يكون هواه تبعًا لما جاء به النبي صلى الله عليه وسلم في كل أموره الظاهرة والباطنة."},{"id":42,"text":"عَنْ أَنَسِ بْنِ مَالِكٍ رَضِيَ اللهُ عَنْهُ قَالَ: سَمِعْت رَسُولَ اللَّهِ صلى الله عليه و سلم يَقُولُ: قَالَ اللَّهُ تَعَالَى: \"يَا ابْنَ آدَمَ! إِنَّكَ مَا دَعَوْتنِي وَرَجَوْتنِي غَفَرْتُ لَك عَلَى مَا كَانَ مِنْك وَلَا أُبَالِي، يَا ابْنَ آدَمَ! لَوْ بَلَغَتْ ذُنُوبُك عَنَانَ السَّمَاءِ ثُمَّ اسْتَغْفَرْتنِي غَفَرْتُ لَك، يَا ابْنَ آدَمَ! إنَّك لَوْ أتَيْتنِي بِقُرَابِ الْأَرْضِ خَطَايَا ثُمَّ لَقِيتنِي لَا تُشْرِكُ بِي شَيْئًا لَأَتَيْتُك بِقُرَابِهَا مَغْفِرَةً\" . رَوَاهُ التِّرْمِذِيُّ ، وَقَالَ: حَدِيثٌ حَسَنٌ صَحِيحٌ.","explain":"سعة رحمة الله ومغفرته لا يحدها ذنب مهما عظم، ما دام العبد أخلص التوحيد ولم يشرك به شيئًا وأقبل تائبًا."}];

/* ================= الحصون الخمسة — خطة حفظ القرآن اليومية ================= */
// المرجع: كتاب "الحصون الخمسة في حفظ القرآن الكريم" د. سعيد أبو العلا حمزة
// تم بناء الحساب بوحدة "الآية" بدل "صفحة المصحف" لضمان الدقة الكاملة، لأن
// تحديد أرقام صفحات مصحف المدينة يحتاج قاعدة بيانات طباعية دقيقة غير متوفرة
// لدينا بثقة كافية، بينما ترقيم السور والآيات موثّق ١٠٠٪ من نص القرآن نفسه.
const WEEKDAYS_AR = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

function husoonSurahName(id){ const s=QURAN_DATA.find(x=>x.id===id); return s?s.name:'—'; }
function husoonSurahLen(id){ const s=QURAN_DATA.find(x=>x.id===id); return s?s.v.length:0; }
function husoonGlobalIndex(surahId, ayah){
  let idx = 0;
  for(const s of QURAN_DATA){ if(s.id===surahId) return idx + (ayah-1); idx += s.v.length; }
  return idx;
}
function husoonAtGlobal(globalIdx){
  let idx = 0;
  for(const s of QURAN_DATA){
    if(globalIdx < idx + s.v.length) return { surah:s.id, ayah: globalIdx - idx + 1 };
    idx += s.v.length;
  }
  return null;
}
// يمشي عدد N من الآيات بدءًا من فهرس عام معيّن، ويرجّع المقاطع (سورة: من-إلى) التي مر بها
function husoonWalk(startGlobal, count){
  const segments = [];
  let cur = startGlobal;
  let remaining = count;
  while(remaining > 0){
    const pos = husoonAtGlobal(cur);
    if(!pos) break;
    const surahLen = husoonSurahLen(pos.surah);
    const availableInSurah = surahLen - pos.ayah + 1;
    const take = Math.min(remaining, availableInSurah);
    segments.push({ surah: pos.surah, from: pos.ayah, to: pos.ayah + take - 1 });
    cur += take;
    remaining -= take;
  }
  return { segments, endGlobal: cur };
}
function husoonDescribe(segments){
  if(!segments || segments.length===0) return 'لا يوجد';
  return segments.map(sg=>{
    const name = husoonSurahName(sg.surah);
    return sg.from===sg.to ? `سورة ${name} — آية ${sg.from}` : `سورة ${name} — من آية ${sg.from} إلى ${sg.to}`;
  }).join('<br>');
}

const QURAN_TOTAL_AYAHS = 6236;

function renderHusoonPlan(perDay){
  const box = $('#husoonPlan');
  const ranges = state.husoonRanges||[];
  if(ranges.length===0){
    box.innerHTML = `<div class="note-box" style="text-align:center;">أضف الأول سورة أو أكتر ممّا حفظته، أو لو لسه بادئ من الصفر اضغط "اعرض خطة اليوم" مباشرة.</div>`;
  }

  // نجمع أعلى نقطة وصلت لها (الفهرس العام الأبعد بين كل النطاقات المُضافة)
  let cursor = 0;
  ranges.forEach(r=>{ cursor = Math.max(cursor, husoonGlobalIndex(r.s, r.b) + 1); });

  if(cursor >= QURAN_TOTAL_AYAHS){
    box.innerHTML = `<div class="note-box" style="text-align:center;color:var(--accent);font-weight:800;">🎉 ما شاء الله! يبدو أنك أتممت حفظ القرآن كاملاً بالفعل، أسأل الله أن يثبتك ويجعله شفيعًا لك.</div>`;
    return;
  }

  // ١) الحفظ الجديد: من نقطة التوقف، بمقدار (perDay) آية
  const newMem = husoonWalk(cursor, perDay);

  // ٢) مراجعة القريب: آخر (perDay * 7) آية قبل نقطة التوقف مباشرة
  const nearWindow = perDay * 7;
  const nearStart = Math.max(0, cursor - nearWindow);
  const near = husoonWalk(nearStart, cursor - nearStart);

  // ٣) مراجعة البعيد: كل ما قبل نطاق "القريب"، مقسّم على أيام الأسبوع (كل يوم جزء بمقدار perDay*4 آية تقريبًا)
  const farTotal = nearStart;
  let far = { segments: [] };
  if(farTotal > 0){
    const dow = new Date().getDay();
    const chunk = Math.max(perDay*4, 20);
    const numChunks = Math.ceil(farTotal / chunk);
    const idx = dow % numChunks;
    const fStart = idx*chunk;
    far = husoonWalk(fStart, Math.min(chunk, farTotal - fStart));
  }

  // ٤) تحضير: الغد = تكملة الحفظ الجديد القادم، الأسبوعي = ٧ أيام قادمة بمعدل perDay/يوم
  const tomorrow = husoonWalk(newMem.endGlobal, perDay);
  const weekPrep = husoonWalk(newMem.endGlobal, perDay*7);

  const totalMinutes = 15 + (near.segments.length?20:0) + (far.segments.length?25:0) + 15 + (tomorrow.segments.length?15:0) + 10 + 40;

  box.innerHTML = `
    <div class="section-title" style="margin-top:0;"><span class="dot"></span>خطة اليوم (${WEEKDAYS_AR[new Date().getDay()]})</div>

    <div class="zikr-card">

      <div class="text" style="font-size:14.5px;">📗 احفظ اليوم:<br>${husoonDescribe(newMem.segments)}<br><small style="color:var(--text-soft);">(حوالي 15 دقيقة)</small></div>
    </div>

    <div class="zikr-card">
      <div class="zikr-meta" style="justify-content:flex-start;"><span class="badge ok">٢ · مراجعة القريب</span></div>
      <div class="text" style="font-size:14.5px;">🔁 راجع:<br>${husoonDescribe(near.segments)}</div>
    </div>

    <div class="zikr-card">
      <div class="zikr-meta" style="justify-content:flex-start;"><span class="badge ok">٣ · مراجعة البعيد</span></div>
      <div class="text" style="font-size:14.5px;">📚 راجع: ${far.segments.length ? husoonDescribe(far.segments) : 'لا يوجد بعد'}</div>
    </div>

    <div class="zikr-card">
      <div class="zikr-meta" style="justify-content:flex-start;"><span class="badge ok">٤ · التحضير</span></div>
      <div class="text" style="font-size:13.5px;line-height:2;">
        🌙 تحضير ليلي/قبلي (استعدادًا للحفظ القادم):<br>${husoonDescribe(tomorrow.segments)}<br>
        📅 تحضير أسبوعي (مادة الأسبوع القادم):<br>${husoonDescribe(weekPrep.segments)}
      </div>
    </div>

    <div class="zikr-card">
      <div class="zikr-meta" style="justify-content:flex-start;"><span class="badge ok">٥ · القراءة المستمرة (الشهرية)</span></div>
      <div class="text" style="font-size:15px;">📖 اقرأ جزأين (٤٠ دقيقة) من المصحف كاملاً — ختمة كل نصف شهر</div>

  `;
}

/* ===== QIBLA ===== */
/* ===== QIBLA — Real Compass ===== */
let qiblaAngle = 0;       // bearing to Mecca from user
let compassHeading = 0;   // device compass heading
let qiblaReady = false;
let orientationListener = null;

// Mecca coordinates
const MECCA_LAT = 21.4225;
const MECCA_LNG = 39.8262;

function calcQibla(lat, lng){
  const φ1 = lat * Math.PI/180;
  const φ2 = MECCA_LAT * Math.PI/180;
  const Δλ = (MECCA_LNG - lng) * Math.PI/180;
  const y = Math.sin(Δλ) * Math.cos(φ2);
  const x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
  let bearing = Math.atan2(y, x) * 180/Math.PI;
  return (bearing + 360) % 360;
}

function distToMecca(lat, lng){
  const R = 6371;
  const dLat = (MECCA_LAT - lat)*Math.PI/180;
  const dLng = (MECCA_LNG - lng)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat*Math.PI/180)*Math.cos(MECCA_LAT*Math.PI/180)*Math.sin(dLng/2)**2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function updateNeedle(){
  const needle = document.getElementById('qiblaNeedle');
  const degEl = document.getElementById('qiblaDeg');
  if(!needle) return;
  // Rotate needle: qiblaAngle relative to north, minus device heading
  const rot = qiblaAngle - compassHeading;
  needle.style.transform = `rotate(${rot}deg)`;
  if(degEl) degEl.textContent = Math.round((rot+360)%360) + '°';
}

function startOrientation(){
  if(orientationListener) return;
  const statusEl = document.getElementById('qiblaStatus');
  let gotAbsolute = false;
  let usingIOS = false;

  function setOk(msg){
    if(statusEl && qiblaReady){ statusEl.textContent = msg; statusEl.className = 'qibla-status ok'; }
  }
  function setWarn(msg){
    if(statusEl && qiblaReady){ statusEl.textContent = msg; statusEl.className = 'qibla-status'; }
  }

  // iOS Safari: webkitCompassHeading is the most reliable true-north heading
  function iosHandler(e){
    if(typeof e.webkitCompassHeading === 'number'){
      usingIOS = true;
      compassHeading = e.webkitCompassHeading;
      setOk('✅ البوصلة تعمل — وجِّه الهاتف للأمام');
      updateNeedle();
    }
  }

  // Standard browsers (mostly Android Chrome/Firefox): prefer the ABSOLUTE event only,
  // since it is referenced to true/magnetic north. The plain (relative) event has no
  // fixed reference and causes inaccurate/jumpy readings if mixed in.
  function absoluteHandler(e){
    if(usingIOS) return; // iOS already handled via webkitCompassHeading
    if(e.absolute !== true && e.alpha === null) return;
    gotAbsolute = true;
    // alpha: 0 = device top points to "world" north-ish, increases counter-clockwise
    compassHeading = (360 - e.alpha) % 360;
    setOk('✅ البوصلة تعمل — وجِّه الهاتف للأمام');
    updateNeedle();
  }

  // Fallback only used if neither iOS heading nor an absolute event ever fires.
  function relativeFallbackHandler(e){
    if(usingIOS || gotAbsolute) return;
    if(e.alpha === null) return;
    compassHeading = (360 - e.alpha) % 360;
    setWarn('⚠️ البوصلة تعمل بدقة تقريبية (لم يتم رصد مرجع الشمال الحقيقي) — حرِّك الهاتف برسم ٨');
    updateNeedle();
  }

  orientationListener = { iosHandler, absoluteHandler, relativeFallbackHandler };
  window.addEventListener('deviceorientation', iosHandler, true);
  window.addEventListener('deviceorientationabsolute', absoluteHandler, true);
  window.addEventListener('deviceorientation', relativeFallbackHandler, true);
}

function stopOrientation(){
  if(!orientationListener) return;
  window.removeEventListener('deviceorientation', orientationListener.iosHandler, true);
  window.removeEventListener('deviceorientationabsolute', orientationListener.absoluteHandler, true);
  window.removeEventListener('deviceorientation', orientationListener.relativeFallbackHandler, true);
  orientationListener = null;
}

function renderQibla(){
  // Reset any previous listener before starting fresh
  if(orientationListener) stopOrientation();
  qiblaReady = false;

  main.innerHTML = `

  // Get location

  navigator.geolocation.getCurrentPosition(

      if(distEl) distEl.textContent = dist.toLocaleString('ar');
      if(degEl) degEl.textContent = Math.round(qiblaAngle) + '°';
      if(cityEl) cityEl.textContent = lat.toFixed(2)+'°,'+lng.toFixed(2)+'°';

      // Try to get city name
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`)
        .then(r=>r.json()).then(d=>{
          const city = d.address?.city || d.address?.town || d.address?.state || 'موقعك';
          if(cityEl) cityEl.textContent = city;
        }).catch(()=>{});

      // Request orientation permission (iOS 13+)
      if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function'){
        statusEl.innerHTML = '<button onclick="window.reqCompass()" style="background:var(--sage-600);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-family:Tajawal;font-size:14px;font-weight:700;cursor:pointer;">اسمح بالوصول للبوصلة 🧭</button>';
        window.reqCompass = ()=>{
          DeviceOrientationEvent.requestPermission().then(p=>{
            if(p==='granted'){ startOrientation(); }
            else { statusEl.textContent='❌ لم يُسمح بالوصول للبوصلة'; statusEl.className='qibla-status err'; }
          });
        };
      } else {
        if(statusEl){ statusEl.textContent = '✅ تم تحديد موقعك — وجِّه الهاتف للأمام'; statusEl.className = 'qibla-status ok'; }
        startOrientation();
      }
      updateNeedle();
    },
    err => {
      const statusEl = document.getElementById('qiblaStatus');
      if(statusEl){
        statusEl.textContent = err.code===1
          ? '❌ يرجى السماح بالوصول للموقع من إعدادات المتصفح'
          : '❌ تعذَّر تحديد الموقع — تحقق من تفعيل GPS';
        statusEl.className = 'qibla-status err';
      }
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

/* ===== STATS ===== */
function renderStats(){
  const k = todayKey();
  const todayData = state.history[k] || {tasbih:0,azkar:0};
  let totalTasbih=0, totalAzkar=0;
  Object.values(state.history).forEach(d=>{ totalTasbih+=d.tasbih||0; totalAzkar+=d.azkar||0; });

  // last 7 days
  let days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const key=d.toISOString().slice(0,10);
    const val=(state.history[key]&&state.history[key].tasbih)||0;
    days.push({key, val, label:['أحد','إثن','ثلا','أرب','خمي','جمع','سبت'][d.getDay()]});
  }
  const max = Math.max(1, ...days.map(d=>d.val));

  main.innerHTML = `
    <div class="section-title"><span class="dot"></span>إحصائيات اليوم</div>
    <div class="stat-cards">
      <div class="stat-card"><div class="num">${todayData.tasbih||0}</div><div class="lbl">تسبيحة اليوم</div></div>
      <div class="stat-card"><div class="num">${todayData.azkar||0}</div><div class="lbl">أذكار مكتملة اليوم</div></div>
    </div>
    <div class="section-title"><span class="dot"></span>آخر 7 أيام (تسبيح)</div>
    <div class="stat-card" style="padding-bottom:26px;">
      <div class="bar-chart" id="barChart"></div>
    </div>
    <div class="section-title"><span class="dot"></span>الإجمالي الكلي</div>
    <div class="stat-cards">
      <div class="stat-card"><div class="num">${totalTasbih}</div><div class="lbl">إجمالي التسبيحات</div></div>
      <div class="stat-card"><div class="num">${totalAzkar}</div><div class="lbl">إجمالي الأذكار</div></div>
    </div>
    <div class="footer-credit">تم التصميم والتطوير بواسطة <b>م/محمد حسني</b></div>
  `;
  const bc = $('#barChart');
  days.forEach(d=>{
    const bar=document.createElement('div'); bar.className='bar';
    bar.innerHTML = `<div style="height:${(d.val/max*100)||2}%"></div><span class="day-lbl">${d.label}</span>`;
    bc.appendChild(bar);
  });
}

  };

function fallbackCopy(link){
  const tmp = document.createElement('input');
  tmp.value = link; document.body.appendChild(tmp);
  tmp.select(); tmp.setSelectionRange(0,99999);
  try{ document.execCommand('copy'); toast('تم نسخ الرابط ✅'); }
  catch(e){ toast('تعذّر نسخ الرابط، انسخه يدويًا'); }
  document.body.removeChild(tmp);
}
function appShareUrl(){
  // Clean canonical link (drop any query string / hash) so the QR always points to the app's home.
  return window.location.origin + window.location.pathname;
}
function isLocalFileContext(){
  return window.location.protocol === 'file:';
}
function renderAppQr(){
  const box = document.getElementById('appQrBox');
  if(!box) return;
  try{
    const qr = qrcode(0, 'M');
    qr.addData(appShareUrl());
    qr.make();
    box.innerHTML = qr.createImgTag(5, 8);
  }catch(e){
    box.innerHTML = '<div style="width:170px;height:170px;display:flex;align-items:center;justify-content:center;color:#999;font-size:11px;text-align:center;padding:10px;">تعذّر إنشاء رمز QR</div>';
  }
}
function requestNotifPermission(){
  if('Notification' in window && Notification.permission==='default'){ Notification.requestPermission(); }
}
function requestNotifPermissionWithFeedback(){
  if(!('Notification' in window)){ toast('المتصفح لا يدعم الإشعارات'); return; }
  if(Notification.permission==='granted'){ toast('الإشعارات مفعّلة بالفعل ✅'); return; }
  if(Notification.permission==='denied'){ toast('الإشعارات محظورة — فعّلها يدويًا من إعدادات المتصفح'); return; }
  Notification.requestPermission().then(p=>{
    toast(p==='granted' ? 'تم تفعيل الإشعارات ✅' : 'لم يتم منح إذن الإشعارات');
    renderSettings();
  });
}

/* ================= REMINDER ENGINE — فحص فعلي لإطلاق تذكير الصباح/المساء ================= */
function fireReminder(title, body){
  const opts = {
    body, icon:'icons/icon-192.png', badge:'icons/icon-72.png',
    dir:'rtl', lang:'ar', vibrate:[200,100,200], tag:title
  };
  if('serviceWorker' in navigator && navigator.serviceWorker.controller){
    navigator.serviceWorker.ready.then(reg => reg.showNotification(title, opts)).catch(()=>{
      try{ new Notification(title, opts); }catch(e){}
    });
  } else if('Notification' in window && Notification.permission==='granted'){
    try{ new Notification(title, opts); }catch(e){}
  }
  // Optional audible tick using the saved volume preference
  try{
    const vol = (state.notifVolume ?? 70) / 100;
    if(vol > 0){
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 660; g.gain.value = vol * 0.15;
      o.start(); setTimeout(()=>{ o.stop(); ctx.close(); }, 350);
    }
  }catch(e){}
}

/* ================= أذان الصلاة — تشغيل تلقائي عند دخول الوقت ================= */
const ADHAN_PRAYERS = [
  {key:'Fajr', ar:'الفجر', file:'adhan-fajr.mp3'},
  {key:'Dhuhr', ar:'الظهر', file:'adhan.mp3'},
  {key:'Asr', ar:'العصر', file:'adhan.mp3'},
  {key:'Maghrib', ar:'المغرب', file:'adhan.mp3'},
  {key:'Isha', ar:'العشاء', file:'adhan.mp3'},
];

function playAdhan(file, label){
  try{
    const vol = (state.adhanVolume ?? 80) / 100;
    const audio = new Audio(file);
    audio.volume = Math.max(0, Math.min(1, vol));
    audio.play().catch(()=>{ /* المتصفح ممكن يمنع التشغيل التلقائي بدون تفاعل مستخدم */ });
    window._currentAdhanAudio = audio;
  }catch(e){}
  if(label) toast('🕌 حان الآن موعد أذان ' + label);
}

function checkAdhan(){
  if(!state.autoAdhan) return;
  const times = window._todayPrayerTimes;
  if(!times) return;
  const now = new Date();
  const hhmm = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const today = todayKey();
  ADHAN_PRAYERS.forEach(p=>{
    const t = times[p.key];
    if(!t) return;
    const key = p.key + '_' + today;
    if(t === hhmm && !state.lastAdhanFired[key]){
      playAdhan(p.file, p.ar);
      state.lastAdhanFired[key] = true;
      // تنظيف بسيط: نحتفظ فقط بمفاتيح اليوم الحالي
      Object.keys(state.lastAdhanFired).forEach(k=>{ if(!k.endsWith(today)) delete state.lastAdhanFired[k]; });
      save();
    }
  });
}

function checkReminders(){
  const before = state.lastCountsResetDate;
  autoResetDailyCounts();
  if(before !== state.lastCountsResetDate && currentView==='category'){ render(); }

  checkAdhan();

  if(typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
  const now = new Date();
  const hhmm = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const today = todayKey();

  if(state.notifSabah && state.timeSabah === hhmm && state.lastNotifSabahDate !== today){
    fireReminder('🌅 حان وقت أذكار الصباح', 'اللَّهُمَّ بِكَ أَصْبَحْنَا وَبِكَ أَمْسَيْنَا — اضغط لفتح التطبيق');
    state.lastNotifSabahDate = today; save();
  }
  if(state.notifMasaa && state.timeMasaa === hhmm && state.lastNotifMasaaDate !== today){
    fireReminder('🌇 حان وقت أذكار المساء', 'اللَّهُمَّ بِكَ أَمْسَيْنَا وَبِكَ أَصْبَحْنَا — اضغط لفتح التطبيق');
    state.lastNotifMasaaDate = today; save();
  }
}
// Check every 20s — reliable enough for minute-level reminders while the app/tab is open.
// IMPORTANT LIMITATION: like any web app without a push-notification backend server,
// this can only fire while the app is open (foreground or a background tab) — a fully
// closed app/browser cannot wake itself up. A true "closed-app alarm" needs a native
// app or a backend with Web Push (VAPID) which this static site doesn't have.
setInterval(checkReminders, 20000);
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') checkReminders(); });

/* ================= SERVICE WORKER REGISTRATION + UPDATE BANNER ================= */
let swRegistration = null;

function showUpdateBanner(reg){
  if(document.getElementById('updateBanner')) return;
  const bar = document.createElement('div');
  bar.id = 'updateBanner';
  bar.style.cssText = 'position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;'
    +'background:var(--sage-700);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;'
    +'gap:10px;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.25);font-family:Tajawal;font-size:13px;';
  bar.innerHTML = `
    <span>🌿 يوجد تحديث جديد للتطبيق</span>
    <button id="updateNowBtn" style="background:var(--gold-500);color:var(--sage-900);border:none;border-radius:10px;
      padding:8px 16px;font-family:Tajawal;font-size:13px;font-weight:800;cursor:pointer;">تحديث الآن</button>
  `;
  document.body.appendChild(bar);
  document.getElementById('updateNowBtn').onclick = ()=> applyWaitingUpdate(reg, bar);
}

function applyWaitingUpdate(reg, bar){
  if(reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
  if(bar) bar.innerHTML = '<span>⏳ جاري التحديث...</span>';
  setTimeout(()=>window.location.reload(), 300);
}

// دالة تحقق يدوي — تُستخدم من زر "التحقق من التحديثات" في الإعدادات
function checkForUpdateNow(onNoUpdate){
  if(!swRegistration){ if(onNoUpdate) onNoUpdate('unsupported'); return; }
  swRegistration.update().then(()=>{
    // امنح المتصفح لحظة ليضع أي عامل جديد في حالة "الانتظار"
    setTimeout(()=>{
      if(swRegistration.waiting){
        applyWaitingUpdate(swRegistration, document.getElementById('updateBanner'));
      } else if(onNoUpdate){
        onNoUpdate('none');
      }
    }, 800);
  }).catch((err)=>{
    console.error('[تحقق من التحديث] فشل الطلب:', err);
    if(onNoUpdate) onNoUpdate('error', err);
  });
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    // updateViaCache:'none' forces the browser to always fetch sw.js fresh
    // from the network when checking for updates, instead of serving a
    // stale cached copy of the script itself (a very common reason updates
    // silently fail to be detected).
    navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' })
      .then(reg => {
        swRegistration = reg;
        // If a worker is already waiting, prompt immediately
        if(reg.waiting && navigator.serviceWorker.controller){ showUpdateBanner(reg); }
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          if(!newWorker) return;
          newWorker.addEventListener('statechange', () => {
            if(newWorker.state === 'installed' && navigator.serviceWorker.controller){
              // New update ready and there's an already-controlling worker (not first install)
              showUpdateBanner(reg);
            }
          });
        });
        // Force an immediate check for updates on load, then re-check
        // periodically and whenever the app returns to the foreground —
        // otherwise the browser may only check for updates on its own
        // schedule (up to once every 24h).
        reg.update().catch(()=>{});
        setInterval(() => reg.update().catch(()=>{}), 60 * 60 * 1000); // hourly
        document.addEventListener('visibilitychange', () => {
          if(document.visibilityState === 'visible') reg.update().catch(()=>{});
        });
      })
      .catch(err => console.log('SW error:', err));

    // Reload once the new SW takes control (after user taps "update now")
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if(refreshing) return;
      refreshing = true;
      window.location.reload();
    });
  });
}
// Update theme-color meta on theme change
const themeMetaColor = document.getElementById('themeMetaColor');
function updateThemeMeta() {
  themeMetaColor.content = state.theme === 'dark' ? '#1B2A1E' : '#4C7050';
}
updateThemeMeta();
applyColor();
if(state.appColor) document.documentElement.setAttribute('data-color', state.appColor);
render();
